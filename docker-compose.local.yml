# Desarrollo local: construye backend/frontend desde el código sin subir imágenes.
# Uso: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
#
# En .env define BACKEND_IMAGE y FRONTEND_IMAGE locales (ej. vibeup-backend:local).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
