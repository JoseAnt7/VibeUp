services:
  mysql:
    image: mysql:8.4
    container_name: vibeup-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vibeup
      MYSQL_USER: vibeup
      MYSQL_PASSWORD: change_mysql_password
      MYSQL_ROOT_PASSWORD: change_root_password
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pchange_root_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vibeup-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      PYTHONUNBUFFERED: 1
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    container_name: vibeup-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mysql_data:
