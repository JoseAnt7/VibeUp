services:
  mysql:
    image: mysql:8.4
    container_name: ${MYSQL_CONTAINER_NAME:-vibeup-mysql}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$${MYSQL_ROOT_PASSWORD}\" mysqladmin ping -h localhost -uroot --silent"]
      start_period: 40s
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${BACKEND_CONTAINER_NAME:-vibeup-backend}
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      PYTHONUNBUFFERED: 1
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    container_name: ${FRONTEND_CONTAINER_NAME:-vibeup-frontend}
    depends_on:
      - backend
    ports:
      - "${HOST_HTTP_PORT:-80}:80"
    restart: unless-stopped

volumes:
  mysql_data:
