services:
  mysql:
    image: mysql:8.4
    container_name: vibeup-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vibeup}
      MYSQL_USER: ${MYSQL_USER:-vibeup}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_mysql_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_root_password}
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$${MYSQL_ROOT_PASSWORD}\" mysqladmin ping -h localhost -uroot --silent"]
      start_period: 40s
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vibeup-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      PYTHONUNBUFFERED: 1
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-vibeup}:${MYSQL_PASSWORD:-change_mysql_password}@mysql:3306/${MYSQL_DATABASE:-vibeup}
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    container_name: vibeup-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mysql_data:
