services:
  mysql:
    image: mysql:8.4
    container_name: ${MYSQL_CONTAINER_NAME:-vibeup-mysql}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$${MYSQL_ROOT_PASSWORD}\" mysqladmin ping -h localhost -uroot --silent"]
      start_period: 40s
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    container_name: ${BACKEND_CONTAINER_NAME:-vibeup-backend}
    environment:
      PORT: ${BACKEND_PORT:-5000}
      PYTHONUNBUFFERED: 1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      GMAIL_SENDER_EMAIL: ${GMAIL_SENDER_EMAIL:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:?APP_PUBLIC_URL is required}
      MAIL_LOGO_URL: ${MAIL_LOGO_URL:-}
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "5000"
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    container_name: ${FRONTEND_CONTAINER_NAME:-vibeup-frontend}
    depends_on:
      - backend
    ports:
      - "${HOST_HTTP_PORT:-80}:80"
    restart: unless-stopped

volumes:
  mysql_data:
