services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vibeup-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      PYTHONUNBUFFERED: 1
    volumes:
      - backend_instance:/app/instance
    expose:
      - "5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
    container_name: vibeup-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  backend_instance:
