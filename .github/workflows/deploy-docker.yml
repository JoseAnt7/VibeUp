# CI/CD: push a la rama `docker` -> build + push imágenes (Docker Hub) + deploy por SSH al VPS.
# Secretos en GitHub: Settings -> Secrets and variables -> Actions

name: Deploy (rama docker)

on:
  push:
    branches: [docker]
  workflow_dispatch:

env:
  IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/vibeup-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/vibeup-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            git fetch origin docker
            git checkout docker
            git pull origin docker
            docker compose pull
            docker compose up -d
            docker compose ps
