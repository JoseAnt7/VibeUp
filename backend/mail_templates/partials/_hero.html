<tr>
  <td style="padding:28px 28px 22px;background:linear-gradient(135deg,#1db954 0%,#0f172a 120%);color:#ffffff;">
    {% if meta_label %}
    <p style="margin:0 0 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;opacity:0.95;">{{ meta_label }}</p>
    {% endif %}
    <h1 style="margin:0;font-size:24px;font-weight:800;line-height:1.2;">{{ title }}</h1>
  </td>
</tr>
